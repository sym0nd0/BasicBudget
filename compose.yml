services:
  basicbudget:
    image: ghcr.io/sym0nd0/basicbudget:latest
    container_name: basicbudget
    ports:
      - "${PORT:-8080}:3000"
    volumes:
      - bb-data:/app/data
    environment:
      # Required secrets — set these in your environment or a .env file
      - SESSION_SECRET=${SESSION_SECRET}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY}
      # Application URLs
      - APP_URL=${APP_URL:-http://localhost:8080}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      # Set COOKIE_SECURE=false if running without an HTTPS reverse proxy (e.g. direct HTTP on port 8080)
      - COOKIE_SECURE=${COOKIE_SECURE}
    restart: unless-stopped

volumes:
  bb-data:
