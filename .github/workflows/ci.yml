name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check — frontend
        run: node node_modules/typescript/bin/tsc -b --noEmit

      - name: TypeScript check — server
        run: node node_modules/typescript/bin/tsc --project tsconfig.server.json --noEmit

      - name: Lint
        run: node node_modules/eslint/bin/eslint.js src server shared

      - name: Tests
        run: npm test
